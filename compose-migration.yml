# Migration integration test: OpenVox Server CA -> openvox-ca.
#
# Topology
# --------
#   old-puppet   - OpenVox Server (JVM, drop-in puppetserver) with its own
#                  built-in CA.  Bootstraps a genuine Puppet-compatible CA
#                  and autosigns agent CSRs.
#   test-runner  - openvox-ca + openvox-ca-ctl image.  Waits for old-puppet to
#                  become healthy, submits CSRs, then imports the CA material
#                  into openvox-ca and verifies everything still works.
#
# The test exercises the real migration path documented in
# docs/migrating-from-puppet-server.md.  OpenVox Server is wire-compatible
# with upstream Puppet Server (same /puppet-ca/v1 API, same CA-dir layout)
# so the same migration code path is exercised.
#
# Usage (from project root):
#   mage test:migration
#   podman-compose -f compose-migration.yml up --build \
#       --exit-code-from test-runner --abort-on-container-exit

name: openvox-ca-migration

services:

  # -- Old Puppet Server (OpenVox Server, JVM) -------------------------------
  old-puppet:
    image: ghcr.io/openvoxproject/openvoxserver:latest
    hostname: old-puppet
    environment:
      OPENVOXSERVER_HOSTNAME: old-puppet
      AUTOSIGN: "true"
      OPENVOXSERVER_JAVA_ARGS: "-Xms512m -Xmx512m"
      # No PuppetDB integration in the migration scenario; disable storeconfigs
      # so /container-entrypoint.d/85-setup-storeconfigs.sh becomes a no-op.
      OPENVOX_STORECONFIGS: "false"
      USE_OPENVOXDB: "false"
    volumes:
      # Pre-default entrypoint hook that fixes ownership of the mount-point
      # before the bundled /container-entrypoint.d/* scripts run.  See the
      # script header for the rationale.
      - ./docker/migration/fix-cadir-ownership.sh:/container-custom-entrypoint.d/pre-default/00-fix-cadir-ownership.sh:ro,z
      # Expose the Puppet Server's CA directory to the test-runner.  The :U
      # flag tells podman to chown the volume contents to the container
      # user-namespace mapping on first mount.
      - old-cadir:/etc/puppetlabs/puppetserver/ca:U
    expose:
      - "8140"
    healthcheck:
      test: ["CMD-SHELL",
             "curl -sfk https://localhost:8140/status/v1/simple 2>/dev/null | grep -q running"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  # -- Test runner (openvox-ca image, runs migration test script) ------------─
  # Runs as root so it can read the old CA files (VoxPupuli creates them
  # 0600 root:root).  The test script copies them to a writable temp dir
  # before use, same as a real migration where an admin would scp/rsync.
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.run
    image: openvox-ca-integ:latest
    user: "0:0"
    depends_on:
      old-puppet:
        condition: service_healthy
    volumes:
      - old-cadir:/old-ca:ro
      - ./test:/test:ro,z
    entrypoint: ["bash", "/test/migration/migration-test.sh"]

volumes:
  old-cadir:
