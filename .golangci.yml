# golangci-lint v2 configuration for github.com/tvaughan/puppet-ca.
#
# Curated, high-signal linter set. The goal is a working quality gate that
# passes clean on the current tree, not a zero-finding utopia. Style-only
# linters that would flood the tree with pre-existing nits (revive, gocritic)
# are deliberately left out.
version: "2"

run:
  timeout: 5m

linters:
  # "standard" enables govet, errcheck, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - gosec       # SAST: security problems
    - bodyclose   # HTTP response bodies are closed
    - errname     # sentinel errors prefixed Err, error types suffixed Error
    - misspell    # common English misspellings
    - nilerr      # returning nil after a non-nil error check
    - nolintlint  # ill-formed or unexplained nolint directives
    - copyloopvar # loop-variable copy detection (Go 1.22+ semantics)

  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
    errcheck:
      # Secondary Close() errors on the read/cleanup path are idiomatic
      # deliberate-ignores; the primary error (open/read/write) is always
      # returned. Production error-path cleanup in filesystem.go is made
      # explicit with `_ =` instead.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (*github.com/tvaughan/puppet-ca/internal/signer.RemoteSigner).Close
        # Best-effort encode/write directly onto the http.ResponseWriter; once
        # the handler has started writing the body a Write/Encode error is
        # unrecoverable and there is nothing useful to do with it.
        - (*encoding/json.Encoder).Encode
        - (net/http.ResponseWriter).Write
        # Best-effort child-process teardown on the shutdown/error path; the
        # launcher is already exiting or returning the primary error.
        - (*os.Process).Kill
        - (*os.Process).Signal
        # Best-effort env cleanup in the signer; failure cannot affect the
        # already-completed operation.
        - os.Unsetenv
    gosec:
      # Categorical false-positives confirmed in the security audit. The
      # per-site rules G204/G115/G118 are instead suppressed inline with a
      # specific, explained //nolint:gosec at each call site so the gate stays
      # sensitive to any future genuinely-tainted subprocess or conversion.
      excludes:
        - G401 # SHA1 mandated by RFC 5280 §4.2.1.2 SKI / RFC 6960 OCSP CertID
        - G505 # crypto/sha1 import mandated by RFC 5280 SKI / RFC 6960 CertID
        - G304 # file-backed cert store; paths are operator-config or gated by ValidateSubject + ".." checks
        - G104 # unhandled errors are covered (with line numbers) by errcheck
        - G702 # taint FP: subprocess argv is the operator's own os.Args / ValidateSubject-gated certname (see per-site G204 notes)
        - G705 # taint FP: handlers write DER/PEM certificate bytes to the response, not HTML/JS

  exclusions:
    rules:
      # Tests legitimately ignore Close()/cleanup errors and use weak
      # primitives in fixtures.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # QF1008 is an opinionated staticcheck "quick-fix" that flags spelling out
      # an embedded field in a selector (e.g. cfg.StorageConfig.ToBackendSpec).
      # The explicit form is a deliberate, documented style choice in the
      # storage-config code (it makes the embedded source obvious), so we do not
      # enforce the terser form. Scoped to QF1008 only via text match so the
      # rest of staticcheck's checks stay active.
      - linters:
          - staticcheck
        text: "QF1008"

formatters:
  enable:
    - gofmt
